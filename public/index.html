<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Park Engine</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div id="app-container">
			<div class="metric-group">
				<div class="metric" id="variance-display">0.00000</div>
				<p class="label-text">variance</p>
			</div>

			<button id="start-btn">START DRIVE</button>

			<div class="footer-group">
				<div id="state-display" class="footnote">
					System idle. Ready for initialization.
				</div>

				<div id="media-controls" class="control-row hidden">
					<button id="replay-btn" title="Replay Track" class="icon-btn">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.2"
							stroke-linecap="round"
							stroke-linejoin="round">
							<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
							<polyline points="3 3 3 8 8 8" />
						</svg>
					</button>

					<button id="download-btn" title="Download Track" class="icon-btn">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.2"
							stroke-linecap="round"
							stroke-linejoin="round">
							<path d="M12 5v14M19 12l-7 7-7-7" />
						</svg>
					</button>
				</div>
			</div>
		</div>

		<audio id="parking-song" preload="auto"></audio>

		<script src="/app.js"></script>
	</body>
</html>
